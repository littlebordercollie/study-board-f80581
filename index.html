<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>秦北辰规划师管理 - 全员学情看板</title>
<style>
  :root{
    --bg:#f5f7fa; --card:#fff; --ink:#1f2937; --sub:#6b7280; --line:#e5e7eb;
    --accent:#2563eb; --risk:#dc2626; --ok:#059669; --warn:#d97706;
    --grade-good:#059669; --grade-wave:#2563eb; --grade-weak:#dc2626; --grade-mid:#6b7280;
    --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;
    background:var(--bg);color:var(--ink);line-height:1.5;-webkit-text-size-adjust:100%}

  /* ---- 密码门 ---- */
  #gate{position:fixed;inset:0;background:linear-gradient(160deg,#1e3a5f,#0f1f33);
    display:flex;align-items:center;justify-content:center;z-index:100;padding:24px}
  #gate .box{background:#fff;border-radius:16px;padding:36px 28px;width:100%;max-width:360px;
    box-shadow:0 20px 50px rgba(0,0,0,.35);text-align:center}
  #gate h1{font-size:19px;margin-bottom:6px}
  #gate p{font-size:13px;color:var(--sub);margin-bottom:22px}
  #pw{width:100%;padding:13px 14px;font-size:16px;border:1.5px solid var(--line);
    border-radius:10px;outline:none;text-align:center;letter-spacing:1px}
  #pw:focus{border-color:var(--accent)}
  #gate button{width:100%;margin-top:14px;padding:13px;font-size:16px;font-weight:600;
    background:var(--accent);color:#fff;border:none;border-radius:10px;cursor:pointer}
  #gate button:active{transform:translateY(1px)}
  #gateErr{color:var(--risk);font-size:13px;margin-top:12px;min-height:18px}
  #gate .lock{font-size:30px;margin-bottom:10px}

  /* ---- 主体 ---- */
  #app{display:none;max-width:1180px;margin:0 auto;padding:16px 14px 60px}
  header.top{margin:6px 2px 16px}
  header.top h1{font-size:20px}
  header.top .meta{font-size:12.5px;color:var(--sub);margin-top:3px}

  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
  .kpi{background:var(--card);border-radius:12px;padding:14px 12px;box-shadow:var(--shadow)}
  .kpi .v{font-size:24px;font-weight:700;line-height:1.1}
  .kpi .l{font-size:12px;color:var(--sub);margin-top:4px}
  .kpi.risk .v{color:var(--risk)}

  .filters{background:var(--card);border-radius:12px;padding:13px;box-shadow:var(--shadow);
    margin-bottom:14px;display:flex;flex-wrap:wrap;gap:10px;align-items:end}
  .filters .fld{display:flex;flex-direction:column;gap:3px}
  .filters label{font-size:11px;color:var(--sub);font-weight:600}
  .filters select,.filters input{padding:8px 10px;font-size:14px;border:1px solid var(--line);
    border-radius:8px;outline:none;background:#fff;min-width:96px}
  .filters input[type=number]{width:78px;min-width:0}
  .filters select:focus,.filters input:focus{border-color:var(--accent)}
  #reset{background:#f3f4f6;border:1px solid var(--line);border-radius:8px;padding:8px 14px;
    font-size:13px;cursor:pointer;color:var(--sub);height:36px;align-self:end}
  .count{font-size:13px;color:var(--sub);margin:0 2px 10px}
  .count b{color:var(--ink)}

  .tbl-wrap{background:var(--card);border-radius:12px;box-shadow:var(--shadow);overflow:hidden}
  table{width:100%;border-collapse:collapse;font-size:13.5px}
  thead th{background:#f9fafb;text-align:left;padding:11px 10px;font-size:12px;color:var(--sub);
    font-weight:600;white-space:nowrap;cursor:pointer;user-select:none;border-bottom:1px solid var(--line)}
  thead th.sorted::after{content:" ▾";color:var(--accent)}
  thead th.sorted.asc::after{content:" ▴"}
  tbody tr.row{border-bottom:1px solid #f1f3f5;cursor:pointer}
  tbody tr.row:hover{background:#f9fbff}
  tbody td{padding:10px;vertical-align:middle}
  td.name{font-weight:600}
  .pill{display:inline-block;padding:2px 8px;border-radius:99px;font-size:11.5px;font-weight:600;white-space:nowrap}
  .pill.risk{background:#fee2e2;color:var(--risk)}
  .pill.ok{background:#d1fae5;color:var(--ok)}
  .rate{font-weight:700}
  .rate.lo{color:var(--risk)}
  .rate.hi{color:var(--ok)}
  .gap-hot{color:var(--risk);font-weight:600}
  .exp-toggle{color:var(--sub);font-size:11px}

  tr.detail td{padding:0;background:#fafbfc;border-bottom:1px solid #f1f3f5}
  .detail-inner{padding:12px 14px 16px}
  .detail-inner h4{font-size:12px;color:var(--sub);margin-bottom:8px;font-weight:600}
  table.sub{font-size:12.5px;background:#fff;border:1px solid var(--line);border-radius:8px;overflow:hidden}
  table.sub th{background:#f3f4f6;padding:7px 9px;font-size:11px}
  table.sub td{padding:7px 9px;border-bottom:1px solid #f3f4f6}
  .grade{display:inline-block;padding:1px 7px;border-radius:6px;font-size:11px;font-weight:600;color:#fff}
  .g-good{background:var(--grade-good)} .g-wave{background:var(--grade-wave)}
  .g-weak{background:var(--grade-weak)} .g-mid{background:var(--grade-mid)}
  .g-na{background:#cbd5e1;color:#475569}

  .empty{text-align:center;padding:40px;color:var(--sub);font-size:14px}
  footer{text-align:center;font-size:11px;color:#9ca3af;margin-top:24px;line-height:1.7}

  @media(max-width:680px){
    .kpis{grid-template-columns:repeat(2,1fr)}
    .filters{gap:8px}
    thead th.hide-sm,tbody td.hide-sm{display:none}
    #app{padding:12px 8px 50px}
  }
</style>
</head>
<body>

<!-- ===== 密码门 ===== -->
<div id="gate">
  <div class="box">
    <div class="lock">🔒</div>
    <h1>全员学情看板</h1>
    <p>本页含学生信息，请输入访问密码</p>
    <input id="pw" type="password" placeholder="访问密码" autocomplete="off" autofocus>
    <button id="unlock">解锁查看</button>
    <div id="gateErr"></div>
  </div>
</div>

<!-- ===== 主体 ===== -->
<div id="app">
  <header class="top" style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap">
    <div>
      <h1>秦北辰规划师管理 - 全员学情看板</h1>
      <div class="meta" id="metaLine"></div>
    </div>
    <button id="exportBtn" style="background:#059669;color:#fff;border:none;border-radius:9px;padding:11px 18px;font-size:14px;font-weight:700;cursor:pointer;white-space:nowrap;box-shadow:0 2px 6px rgba(5,150,105,.3)">⬇ 导出Excel(当前筛选)</button>
  </header>

  <div class="kpis" id="kpis"></div>

  <div style="display:flex;gap:8px;margin-bottom:14px">
    <button id="tabStudents" onclick="switchView('students')" style="padding:9px 16px;border:1px solid #e5e7eb;border-radius:9px;font-size:14px;font-weight:600;cursor:pointer;background:#2563eb;color:#fff">📋 学生明细</button>
    <button id="tabRankings" onclick="switchView('rankings')" style="padding:9px 16px;border:1px solid #e5e7eb;border-radius:9px;font-size:14px;font-weight:600;cursor:pointer;background:#fff;color:#6b7280">📊 排名看板</button>
  </div>

  <div id="viewStudents">
  <div class="filters">
    <div class="fld"><label>校区</label><select id="fCampus"></select></div>
    <div class="fld"><label>类型</label><select id="fExam"></select></div>
    <div class="fld"><label>风险</label>
      <select id="fRisk"><option value="all">全部</option><option value="1">仅风险</option><option value="0">仅正常</option></select>
    </div>
    <div class="fld"><label>规划师</label><select id="fPlanner"></select></div>
    <div class="fld"><label>完成率 ≥</label><input id="fRateMin" type="number" min="0" max="100" step="5" placeholder="0"></div>
    <div class="fld"><label>完成率 ≤</label><input id="fRateMax" type="number" min="0" max="100" step="5" placeholder="100"></div>
    <div class="fld" style="flex:1;min-width:140px"><label>搜索 姓名/规划师</label><input id="fSearch" type="text" placeholder="输入关键字…"></div>
    <button id="reset">重置</button>
  </div>

  <div class="count" id="count"></div>

  <div class="tbl-wrap">
    <table id="tbl">
      <thead><tr>
        <th data-k="student">姓名</th>
        <th data-k="campus" class="hide-sm">校区</th>
        <th data-k="exam_type" class="hide-sm">类型</th>
        <th data-k="planner" class="hide-sm">规划师</th>
        <th data-k="weeks">进度周</th>
        <th data-k="rate">完成率</th>
        <th class="hide-sm">完成数</th>
        <th data-k="risk">风险</th>
        <th data-k="gap" class="hide-sm">最长空窗</th>
      </tr></thead>
      <tbody id="tbody"></tbody>
    </table>
    <div class="empty" id="empty" style="display:none">没有符合条件的学生</div>
  </div>
  </div>

  <div id="viewRankings" style="display:none"></div>

  <footer>
    数据本地加密 · 仅供秦北辰教研内部查阅 · 请勿外传截图<br>
    口径：风险 = 实际进度≥4周 且 核心科完成率&lt;70% ｜ 数据快照 <span id="snapDate"></span>
  </footer>
</div>
<div id="tip" style="display:none;position:fixed;z-index:200;background:#1f2937;color:#fff;font-size:12px;padding:5px 9px;border-radius:6px;pointer-events:none;box-shadow:0 2px 8px rgba(0,0,0,.3);white-space:nowrap"></div>

// ====== Web Crypto 解密 (AES-GCM + PBKDF2-SHA256, 200000 轮) ======
function b64ToBytes(b64){const bin=atob(b64);const u=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)u[i]=bin.charCodeAt(i);return u;}
async function decrypt(pw){
  const blob=b64ToBytes(CIPHER);
  const salt=blob.slice(0,16), iv=blob.slice(16,28), ct=blob.slice(28);
  const km=await crypto.subtle.importKey("raw",new TextEncoder().encode(pw),{name:"PBKDF2"},false,["deriveKey"]);
  const key=await crypto.subtle.deriveKey(
    {name:"PBKDF2",salt,iterations:200000,hash:"SHA-256"},km,
    {name:"AES-GCM",length:256},false,["decrypt"]);
  const pt=await crypto.subtle.decrypt({name:"AES-GCM",iv},key,ct);
  return JSON.parse(new TextDecoder().decode(pt));
}

let DATA=null, FILTERED=[], sortKey="rate", sortAsc=true, expanded=new Set();

// ====== 解锁流程 ======
const gateErr=document.getElementById("gateErr");
async function tryUnlock(){
  const pw=document.getElementById("pw").value.trim();
  if(!pw){gateErr.textContent="请输入密码";return;}
  gateErr.textContent="解密中…";
  try{
    DATA=await decrypt(pw);
    document.getElementById("gate").style.display="none";
    document.getElementById("app").style.display="block";
    boot();
  }catch(e){gateErr.textContent="密码错误，无法解密";}
}
document.getElementById("unlock").addEventListener("click",tryUnlock);
document.getElementById("pw").addEventListener("keydown",e=>{if(e.key==="Enter")tryUnlock();});

// ====== 渲染逻辑(解锁后) ======
function boot(){
  const m=DATA.meta;
  document.getElementById("metaLine").textContent=`数据快照 ${m.snapshot} ｜ 共 ${m.n_student} 名学生 ｜ ${m.exam_breakdown}`;
  document.getElementById("snapDate").textContent=m.snapshot;
  document.getElementById("kpis").innerHTML=`
    <div class="kpi"><div class="v">${m.n_student}</div><div class="l">学生总数</div></div>
    <div class="kpi risk"><div class="v">${m.n_risk}</div><div class="l">风险学生</div></div>
    <div class="kpi risk"><div class="v">${m.risk_rate}%</div><div class="l">风险率</div></div>
    <div class="kpi"><div class="v">${m.avg_rate}%</div><div class="l">平均完成率</div></div>`;
  fillSelect("fCampus","校区",uniq("campus"));
  fillSelect("fExam","类型",uniq("exam_type"));
  fillSelect("fPlanner","规划师",uniq("planner"));
  ["fCampus","fExam","fRisk","fPlanner","fRateMin","fRateMax","fSearch"].forEach(id=>{
    const el=document.getElementById(id);
    el.addEventListener(el.tagName==="SELECT"?"change":"input",apply);
  });
  document.getElementById("reset").addEventListener("click",()=>{
    ["fCampus","fExam","fPlanner"].forEach(id=>document.getElementById(id).value="");
    document.getElementById("fRisk").value="all";
    ["fRateMin","fRateMax","fSearch"].forEach(id=>document.getElementById(id).value="");
    apply();
  });
  document.getElementById("exportBtn").addEventListener("click",exportXLSX);
  document.querySelectorAll("#tbl thead th").forEach(th=>th.addEventListener("click",()=>{
    const k=th.dataset.k;
    if(sortKey===k)sortAsc=!sortAsc; else{sortKey=k;sortAsc=(k==="student"||k==="campus"||k==="planner"||k==="exam_type");}
    apply();
  }));
  if(DATA.meta.rankings) renderRankings(DATA.meta.rankings);
  apply();
}
function uniq(k){return [...new Set(DATA.students.map(s=>s[k]).filter(Boolean))].sort();}
function fillSelect(id,label,vals){
  const el=document.getElementById(id);
  el.innerHTML=`<option value="">全部${label}</option>`+vals.map(v=>`<option>${v}</option>`).join("");
}
function apply(){
  const c=val("fCampus"),ex=val("fExam"),rk=val("fRisk"),pl=val("fPlanner"),
    rmin=parseFloat(val("fRateMin")),rmax=parseFloat(val("fRateMax")),
    q=val("fSearch").toLowerCase();
  FILTERED=DATA.students.filter(s=>{
    if(c&&s.campus!==c)return false;
    if(ex&&s.exam_type!==ex)return false;
    if(rk!=="all"&&String(s.risk)!==rk)return false;
    if(pl&&s.planner!==pl)return false;
    const r=s.rate*100;
    if(!isNaN(rmin)&&r<rmin)return false;
    if(!isNaN(rmax)&&r>rmax)return false;
    if(q&&!((s.student||"").toLowerCase().includes(q)||(s.planner||"").toLowerCase().includes(q)))return false;
    return true;
  });
  FILTERED.sort((a,b)=>{
    let x=a[mapKey(sortKey)],y=b[mapKey(sortKey)];
    if(typeof x==="string"){x=x||"";y=y||"";return sortAsc?x.localeCompare(y,"zh"):y.localeCompare(x,"zh");}
    x=x??-1;y=y??-1;return sortAsc?x-y:y-x;
  });
  render();
}
function mapKey(k){return {weeks:"weeks",rate:"rate",risk:"risk",gap:"gap"}[k]||k;}
function val(id){return document.getElementById(id).value;}

function render(){
  const tb=document.getElementById("tbody");
  document.getElementById("count").innerHTML=`显示 <b>${FILTERED.length}</b> / ${DATA.students.length} 人`;
  document.querySelectorAll("#tbl thead th").forEach(th=>{
    th.classList.toggle("sorted",th.dataset.k===sortKey);
    th.classList.toggle("asc",th.dataset.k===sortKey&&sortAsc);
  });
  document.getElementById("empty").style.display=FILTERED.length?"none":"block";
  tb.innerHTML=FILTERED.map((s,i)=>rowHTML(s,i)).join("");
  tb.querySelectorAll("tr.row").forEach(tr=>tr.addEventListener("click",()=>{
    const id=tr.dataset.id;
    if(expanded.has(id))expanded.delete(id);else expanded.add(id);
    render();
  }));
}
function rowHTML(s,i){
  const r=Math.round(s.rate*1000)/10;
  const rateCls=r<70?"lo":(r>=85?"hi":"");
  const gapHot=s.gap>=90?"gap-hot":"";
  const open=expanded.has(String(s.id));
  let html=`<tr class="row" data-id="${s.id}">
    <td class="name">${esc(s.student)} <span class="exp-toggle">${open?"▲":"▼"}</span></td>
    <td class="hide-sm">${esc(s.campus||"")}</td>
    <td class="hide-sm">${esc(s.exam_type||"")}</td>
    <td class="hide-sm">${esc(s.planner||"")}</td>
    <td>${s.weeks??"–"}</td>
    <td><span class="rate ${rateCls}">${r}%</span></td>
    <td class="hide-sm">${s.assigned_total?s.done_total+"/"+s.assigned_total:"–"}</td>
    <td>${s.risk?'<span class="pill risk">风险</span>':'<span class="pill ok">正常</span>'}</td>
    <td class="hide-sm"><span class="${gapHot}">${s.gap!=null?s.gap+"天":"–"}</span></td>
  </tr>`;
  if(open)html+=`<tr class="detail"><td colspan="9"><div class="detail-inner">
    <h4>单科明细 · ${esc(s.student)}</h4>${subTable(s.subjects)}${renderTrend(s)}</div></td></tr>`;
  return html;
}
function subTable(subs){
  if(!subs||!subs.length)return '<div style="color:#9ca3af;font-size:12px">无单科数据</div>';
  const rows=subs.map(x=>{
    const r=x.rate!=null?Math.round(x.rate*1000)/10+"%":"–";
    return `<tr><td>${esc(x.subject)}</td><td>${esc(x.teacher||"–")}</td><td>${r}</td><td>${x.assigned?x.done+"/"+x.assigned:"–"}</td>
      <td>${x.q_mean??"–"}</td><td>${x.q_peak??"–"}</td><td>${gradeTag(x.grade)}</td></tr>`;
  }).join("");
  return `<table class="sub" style="width:100%"><thead><tr>
    <th>科目</th><th>老师</th><th>完成率</th><th>完成次数</th><th>质量均分</th><th>峰值</th><th>能力判定</th>
    </tr></thead><tbody>${rows}</tbody></table>`;
}
function gradeTag(g){
  const map={"稳定优秀":"g-good","有能力·波动":"g-wave","能力不足·勉强":"g-weak","中等":"g-mid","数据不足":"g-na"};
  return g?`<span class="grade ${map[g]||"g-na"}">${g}</span>`:"–";
}
// 各科得分趋势折线图(内联SVG; 纵轴自适应该生分数区间; 点带<title>悬停看详情; 没做的周断开)
var _TC={'读':'#2563eb','听':'#059669','说':'#d97706','写':'#dc2626','单词':'#6b7280','语法':'#0891b2','数学':'#db2777','科学':'#92400e'};
function _tEsc(v){return String(v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function renderTrend(s){
  var t=s.trend;
  if(!t||!t.axis||t.axis.length<2) return '<div style="margin-top:12px;font-size:12px;color:#9ca3af">该生有分作业不足 2 次，暂无得分趋势图</div>';
  var subjs=Object.keys(t).filter(function(k){return k!=='axis';});
  var vals=[]; subjs.forEach(function(sj){t[sj].forEach(function(p){if(p)vals.push(p[0]);});});
  if(vals.length<2) return '<div style="margin-top:12px;font-size:12px;color:#9ca3af">该生有分作业不足 2 次，暂无得分趋势图</div>';
  // 自适应纵轴: 按该生 min-max 撑满(取整到5, 留padding, 限0-100, 最小跨度10)
  var lo=Math.min.apply(null,vals),hi=Math.max.apply(null,vals),pad=Math.max(3,(hi-lo)*0.12);
  var ymin=Math.max(0,Math.floor((lo-pad)/5)*5),ymax=Math.min(100,Math.ceil((hi+pad)/5)*5);
  if(ymax-ymin<10){ymax=Math.min(100,ymin+10); if(ymax-ymin<10)ymin=Math.max(0,ymax-10);}
  var W=620,H=200,pL=32,pR=10,pT=14,pB=28,n=t.axis.length,iw=W-pL-pR,ih=H-pT-pB;
  var xs=function(i){return pL+(n<=1?iw/2:iw*i/(n-1));};
  var ys=function(v){return pT+ih*(1-(v-ymin)/(ymax-ymin));};
  var g='';
  [ymin,(ymin+ymax)/2,ymax].forEach(function(v){var y=ys(v);
    g+='<line x1="'+pL+'" y1="'+y+'" x2="'+(W-pR)+'" y2="'+y+'" stroke="#eef0f2"/><text x="'+(pL-3)+'" y="'+(y+3)+'" font-size="9" fill="#9ca3af" text-anchor="end">'+Math.round(v)+'</text>';});
  var step=Math.max(1,Math.ceil(n/12));
  for(var i=0;i<n;i+=step) g+='<text x="'+xs(i)+'" y="'+(H-8)+'" font-size="8.5" fill="#9ca3af" text-anchor="middle">'+t.axis[i]+'</text>';
  var lines='',legend='';
  subjs.forEach(function(sj){
    var arr=t[sj],c=_TC[sj]||'#888',pts=[],seg=[];
    arr.forEach(function(p,i){ if(p==null){ if(pts.length){seg.push(pts);pts=[];} } else pts.push([xs(i),ys(p[0]),i,p[0],p[1]]); });
    if(pts.length)seg.push(pts);
    seg.forEach(function(p){
      if(p.length>1) lines+='<polyline points="'+p.map(function(q){return q[0]+','+q[1];}).join(' ')+'" fill="none" stroke="'+c+'" stroke-width="2"/>';
      p.forEach(function(q){
        var tip=t.axis[q[2]]+' · '+sj+' · '+q[3]+'分'+(q[4]!=null?(' · 完成率'+Math.round(q[4]*100)+'%'):'');
        lines+='<circle cx="'+q[0]+'" cy="'+q[1]+'" r="3.2" fill="'+c+'" style="cursor:pointer" data-tip="'+_tEsc(tip)+'" onmouseover="showTip(event,this)" onmousemove="showTip(event,this)" onmouseout="hideTip()"/>';
      });
    });
    legend+='<span style="color:'+c+';font-weight:600;margin-right:12px;white-space:nowrap">●'+sj+'</span>';
  });
  return '<div style="margin-top:14px"><div style="font-size:12px;color:#6b7280;margin-bottom:5px">各科得分趋势（最近'+n+'周 · 纵轴自适应 '+ymin+'-'+ymax+' 分 · 鼠标悬停点看周次/科目/分数/完成率）</div>'+
    '<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;height:auto;background:#fff;border:1px solid #eef0f2;border-radius:8px">'+g+lines+'</svg>'+
    '<div style="font-size:11.5px;margin-top:5px;display:flex;flex-wrap:wrap;gap:2px">'+legend+'</div></div>';
}
function esc(s){return String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
// 自定义悬停浮层(立即显示, 比原生<title>快)
function showTip(e,el){var d=document.getElementById('tip');d.textContent=el.getAttribute('data-tip');d.style.display='block';
  var x=e.clientX+14,y=e.clientY+14; if(x+180>innerWidth)x=e.clientX-166; d.style.left=x+'px'; d.style.top=y+'px';}
function hideTip(){document.getElementById('tip').style.display='none';}
// 视图切换(学生明细 ⇄ 排名看板)
function switchView(v){
  var st=v==='students';
  document.getElementById('viewStudents').style.display=st?'block':'none';
  document.getElementById('viewRankings').style.display=st?'none':'block';
  var a=document.getElementById('tabStudents'),b=document.getElementById('tabRankings');
  a.style.background=st?'#2563eb':'#fff'; a.style.color=st?'#fff':'#6b7280';
  b.style.background=st?'#fff':'#2563eb'; b.style.color=st?'#6b7280':'#fff';
}
function _bar(pct,color){var w=Math.max(0,Math.min(100,pct||0));
  return '<div style="background:#f1f3f5;border-radius:5px;height:14px;overflow:hidden"><div style="width:'+w+'%;height:100%;background:'+color+';border-radius:5px"></div></div>';}
function _card(title,sub,body){
  return '<div style="background:#fff;border-radius:12px;padding:16px;box-shadow:var(--shadow);margin-bottom:14px">'+
    '<h3 style="font-size:16px;margin-bottom:'+(sub?'2px':'10px')+'">'+title+'</h3>'+
    (sub?'<div style="font-size:12px;color:#9ca3af;margin-bottom:10px">'+sub+'</div>':'')+body+'</div>';
}
// 排名可视化页
function renderRankings(r){
  var m=DATA.meta,h='';
  h+=_card('① 总体','',
    '<div style="display:flex;gap:20px;flex-wrap:wrap;font-size:13px;color:#6b7280">'+
    '<div><b style="font-size:24px;color:#1f2937">'+m.n_student+'</b><br>学生总数</div>'+
    '<div><b style="font-size:24px;color:#dc2626">'+m.n_risk+'</b><br>风险学生</div>'+
    '<div><b style="font-size:24px;color:#dc2626">'+m.risk_rate+'%</b><br>风险率</div>'+
    '<div><b style="font-size:24px;color:#1f2937">'+m.avg_rate+'%</b><br>平均完成率</div></div>');
  var cb='';
  r.campus.forEach(function(c){
    cb+='<div style="margin-bottom:14px"><div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:3px"><b>'+esc(c.name)+'</b><span>风险 '+c.risk+'/'+c.n+' '+c.risk_rate+'%</span></div>'+
      _bar(c.risk_rate,'#dc2626')+
      '<div style="display:flex;justify-content:space-between;font-size:12px;color:#6b7280;margin:4px 0 2px"><span>·完成率</span><span>均 '+c.rate+'%</span></div>'+_bar(c.rate,'#059669')+'</div>';
  });
  h+=_card('② 按校区','各校区风险占比与平均完成率横向对比',cb);

  var tb='';
  Object.keys(byS).forEach(function(sj){
    tb+='<div style="font-weight:600;margin:12px 0 7px;color:'+(_TC[sj]||'#333')+'">● '+sj+'·老师完成率(升序)</div>';
    byS[sj].forEach(function(t){
      var tag=''; if(t.q!=null){
        if(t.rate<70&&t.q>=75)tag=' <span style="background:#fef3c7;color:#d97706;padding:1px 6px;border-radius:5px;font-size:11px">学生执行</span>';
        else if(t.q<70)tag=' <span style="background:#fee2e2;color:#dc2626;padding:1px 6px;border-radius:5px;font-size:11px">关注教学</span>';
        else tag=' <span style="color:#9ca3af;font-size:11px">质量'+t.q+'</span>';}
      tb+='<div style="margin-bottom:8px"><div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:2px"><span>'+esc(t.teacher)+'</span><span><b>'+t.rate+'%</b> '+t.n+'人'+tag+'</span></div>'+_bar(t.rate,'#2563eb')+'</div>';
    });
  });
  h+=_card('③ 按老师·单科','各科老师名下学生平均完成率(升序)。完成率低但质量≥75=学生执行问题；质量&lt;70=需关注教学。仅统计名下≥3人。',tb);
  var sb='';
  r.subject.forEach(function(s){
    sb+='<div style="margin-bottom:12px"><div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:2px"><b>'+s.subject+'</b><span>完成率 '+s.rate+'% · 质量 '+(s.q==null?'–':s.q)+' · 稳定'+s.good+'/波动'+s.wave+'/不足'+s.weak+'</span></div>'+_bar(s.rate,'#0891b2')+'</div>';
  });
  h+=_card('④ 按单科','各科平均完成率(升序)与能力三档分布',sb);
  document.getElementById('viewRankings').innerHTML=h;
}

// 导出当前筛选结果为 真·Excel(.xlsx)(全量或筛选后; 纯前端零依赖手写生成器, openpyxl 已验证)
function exportXLSX(){
  var SUBS=['读','听','说','写','语法','数学','科学'];
  var head=['学生','校区','类型','规划师','进度周','总完成率%']
    .concat(SUBS.map(s=>s+'完成率%')).concat(SUBS.map(s=>s+'质量分')).concat(['修改建议']);
  var rows=[];
  FILTERED.forEach(function(s){
    var by={}; (s.subjects||[]).forEach(function(x){by[x.subject]=x;});
    var r=[s.student,s.campus,s.exam_type,s.planner||'',
      (s.weeks==null?'':s.weeks), (s.rate==null?'':Math.round(s.rate*1000)/10)];
    SUBS.forEach(function(k){var x=by[k]; r.push(x&&x.rate!=null?Math.round(x.rate*1000)/10:'');});
    SUBS.forEach(function(k){var x=by[k]; r.push(x&&x.q_mean!=null?x.q_mean:'');});
    r.push(s.advice||'');
    rows.push(r);
  });
  var blob=new Blob(makeXLSXParts(head,rows),{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
  var a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='学情导出_'+FILTERED.length+'人.xlsx'; a.click(); URL.revokeObjectURL(a.href);
}
// —— 零依赖 xlsx 生成器(CRC32 + store-zip + 最小 xlsx XML; openpyxl 端到端验证可被 Excel 打开) ——
var _CRCT=(function(){var t=[];for(var n=0;n<256;n++){var c=n;for(var k=0;k<8;k++)c=(c&1)?(0xEDB88320^(c>>>1)):(c>>>1);t[n]=c>>>0;}return t;})();
function _crc32(b){var c=0xFFFFFFFF;for(var i=0;i<b.length;i++)c=(c>>>8)^_CRCT[(c^b[i])&0xFF];return (c^0xFFFFFFFF)>>>0;}
function _col(n){var s='';n++;while(n>0){var m=(n-1)%26;s=String.fromCharCode(65+m)+s;n=(n-m-1)/26;}return s;}
function _xe(v){return String(v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function _sheet(all){
  var sb='<?xml version="1.0" encoding="UTF-8" standalone="yes"?><worksheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main"><sheetData>';
  all.forEach(function(row,ri){ sb+='<row r="'+(ri+1)+'">';
    row.forEach(function(v,ci){ var ref=_col(ci)+(ri+1);
      if(typeof v==='number'&&isFinite(v)) sb+='<c r="'+ref+'"><v>'+v+'</v></c>';
      else if(v===''||v==null){} else sb+='<c r="'+ref+'" t="inlineStr"><is><t xml:space="preserve">'+_xe(v)+'</t></is></c>';
    }); sb+='</row>';
  }); return sb+'</sheetData></worksheet>';
}
function _zip(files){
  var enc=new TextEncoder(),parts=[],central=[],offset=0;
  Object.keys(files).forEach(function(name){
    var nm=enc.encode(name),data=enc.encode(files[name]),crc=_crc32(data);
    var lh=new DataView(new ArrayBuffer(30));
    lh.setUint32(0,0x04034b50,true); lh.setUint16(4,20,true);
    lh.setUint32(14,crc,true); lh.setUint32(18,data.length,true); lh.setUint32(22,data.length,true);
    lh.setUint16(26,nm.length,true);
    parts.push(new Uint8Array(lh.buffer),nm,data);
    central.push({nm:nm,crc:crc,size:data.length,off:offset}); offset+=30+nm.length+data.length;
  });
  var cdStart=offset,cd=[];
  central.forEach(function(f){
    var ch=new DataView(new ArrayBuffer(46));
    ch.setUint32(0,0x02014b50,true); ch.setUint16(4,20,true); ch.setUint16(6,20,true);
    ch.setUint32(16,f.crc,true); ch.setUint32(20,f.size,true); ch.setUint32(24,f.size,true);
    ch.setUint16(28,f.nm.length,true); ch.setUint32(42,f.off,true);
    cd.push(new Uint8Array(ch.buffer),f.nm); offset+=46+f.nm.length;
  });
  var eo=new DataView(new ArrayBuffer(22));
  eo.setUint32(0,0x06054b50,true); eo.setUint16(8,central.length,true); eo.setUint16(10,central.length,true);
  eo.setUint32(12,offset-cdStart,true); eo.setUint32(16,cdStart,true);
  return parts.concat(cd,[new Uint8Array(eo.buffer)]);
}
function makeXLSXParts(headers,rows){
  return _zip({
    '[Content_Types].xml':'<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types"><Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/><Default Extension="xml" ContentType="application/xml"/><Override PartName="/xl/workbook.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet.main+xml"/><Override PartName="/xl/worksheets/sheet1.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.worksheet+xml"/></Types>',
    '_rels/.rels':'<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="xl/workbook.xml"/></Relationships>',
    'xl/workbook.xml':'<?xml version="1.0" encoding="UTF-8" standalone="yes"?><workbook xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships"><sheets><sheet name="学情" sheetId="1" r:id="rId1"/></sheets></workbook>',
    'xl/_rels/workbook.xml.rels':'<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/worksheet" Target="worksheets/sheet1.xml"/></Relationships>',
    'xl/worksheets/sheet1.xml':_sheet([headers].concat(rows))
  });
}
